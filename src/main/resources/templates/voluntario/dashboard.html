<!DOCTYPE html><html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Meu acompanhamento</title><link rel="stylesheet" th:href="@{/css/style.css}"></head><body><header th:replace="~{fragments/layout :: header}"></header><main class="container page"><div class="volunteer-hero"><div><span class="eyebrow">ÁREA DO VOLUNTÁRIO</span><h1>Olá, <span th:text="${voluntario.nome}"></span>.</h1><p>Acompanhe sua participação e a carga horária registrada no projeto.</p></div><div class="hours-circle"><strong th:text="${#numbers.formatDecimal(totalHoras,1,1)}"></strong><span>horas</span></div></div><section class="panel progress-panel"><div class="panel-head"><div><h2>Progresso para certificação</h2><p th:text="${apto} ? 'Carga horária mínima alcançada. Parabéns!' : 'Continue participando das atividades do projeto.'"></p></div><span class="badge" th:classappend="${apto} ? ' badge-success' : ' badge-info'" th:text="${apto} ? 'Apto para certificado' : 'Em andamento'"></span></div><div class="big-progress"><div><span th:style="${'width:' + percentual + '%'}"></span></div><p><b th:text="${#numbers.formatDecimal(totalHoras,1,1)} + 'h'"></b> de <b th:text="${horasMinimas} + 'h'"></b></p></div></section><div class="page-heading small"><div><h2>Minhas atividades</h2><p>Histórico das ações em que você foi registrado.</p></div></div><div class="cards-list"><article class="activity-card" th:each="p : ${participacoes}"><div class="date-box"><strong th:text="${#temporals.format(p.atividade.data,'dd')}"></strong><span th:text="${#strings.toUpperCase(#temporals.format(p.atividade.data,'MMM'))}"></span></div><div class="activity-content"><div><span class="badge" th:classappend="${p.presente} ? ' badge-success' : ' badge-danger'" th:text="${p.presente} ? 'Presença confirmada' : 'Ausência'"></span><h3 th:text="${p.atividade.titulo}"></h3><p th:text="${p.atividade.descricao}"></p></div><div class="activity-meta"><span>⌖ <b th:text="${p.atividade.local}"></b></span><span>◷ <b th:text="${#numbers.formatDecimal(p.horasRealizadas,1,1)} + ' horas registradas'"></b></span></div></div></article><div th:if="${#lists.isEmpty(participacoes)}" class="empty-card">Você ainda não possui participações registradas.</div></div></main><footer th:replace="~{fragments/layout :: footer}"></footer></body></html>

<!DOCTYPE html><html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Cadastro de voluntário</title><link rel="stylesheet" th:href="@{/css/style.css}"></head><body><header th:replace="~{fragments/layout :: header}"></header><main class="container page narrow"><div class="page-heading"><div><span class="eyebrow">VOLUNTÁRIOS</span><h1 th:text="${edicao} ? 'Editar voluntário' : 'Novo voluntário'"></h1><p>Preencha os dados acadêmicos e de acesso.</p></div></div><div th:if="${erro}" class="alert alert-error" th:text="${erro}"></div><form class="form-card" th:action="${edicao} ? @{/coordenador/voluntarios/{id}(id=${id})} : @{/coordenador/voluntarios}" th:object="${form}" method="post"><div class="form-grid"><label class="span-2">Nome completo<input th:field="*{nome}" placeholder="Nome do participante"><small class="field-error" th:errors="*{nome}"></small></label><label>E-mail<input type="email" th:field="*{email}" placeholder="email@exemplo.com"><small class="field-error" th:errors="*{email}"></small></label><label>Matrícula<input th:field="*{matricula}" placeholder="2026001"><small class="field-error" th:errors="*{matricula}"></small></label><label>Curso<input th:field="*{curso}" placeholder="Curso de graduação"><small class="field-error" th:errors="*{curso}"></small></label><label>Telefone<input th:field="*{telefone}" placeholder="(00) 00000-0000"><small class="field-error" th:errors="*{telefone}"></small></label><label class="span-2">Senha <small th:text="${edicao} ? '(deixe em branco para manter a atual)' : '(mínimo de 6 caracteres)'"></small><input type="password" th:field="*{senha}" autocomplete="new-password"><small class="field-error" th:errors="*{senha}"></small></label><label class="check-row span-2"><input type="checkbox" th:field="*{ativo}"><span>Voluntário ativo e autorizado a acessar o sistema</span></label></div><div class="form-actions"><a class="btn btn-outline" th:href="@{/coordenador/voluntarios}">Cancelar</a><button class="btn btn-primary">Salvar voluntário</button></div></form></main><footer th:replace="~{fragments/layout :: footer}"></footer></body></html>

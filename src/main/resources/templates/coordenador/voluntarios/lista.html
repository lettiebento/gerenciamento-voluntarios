<!DOCTYPE html><html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Voluntários</title><link rel="stylesheet" th:href="@{/css/style.css}"></head><body><header th:replace="~{fragments/layout :: header}"></header><div th:replace="~{fragments/layout :: flash}"></div><main class="container page"><div class="page-heading"><div><span class="eyebrow">CADASTROS</span><h1>Voluntários</h1><p>Gerencie os membros vinculados ao projeto.</p></div><a class="btn btn-primary" th:href="@{/coordenador/voluntarios/novo}">+ Novo voluntário</a></div><div class="table-card"><table><thead><tr><th>Voluntário</th><th>Matrícula</th><th>Curso</th><th>Contato</th><th>Status</th><th>Ações</th></tr></thead><tbody><tr th:each="v : ${voluntarios}"><td><strong th:text="${v.nome}"></strong><small th:text="${v.email}"></small></td><td th:text="${v.matricula}"></td><td th:text="${v.curso}"></td><td th:text="${v.telefone ?: '—'}"></td><td><span class="badge" th:classappend="${v.ativo} ? ' badge-success' : ' badge-muted'" th:text="${v.ativo} ? 'Ativo' : 'Inativo'"></span></td><td class="actions"><a class="btn btn-outline btn-sm" th:href="@{/coordenador/voluntarios/{id}/editar(id=${v.id})}">Editar</a><form th:action="@{/coordenador/voluntarios/{id}/excluir(id=${v.id})}" method="post" onsubmit="return confirm('Excluir este voluntário e suas participações?')"><button class="btn btn-danger btn-sm">Excluir</button></form></td></tr><tr th:if="${#lists.isEmpty(voluntarios)}"><td colspan="6" class="empty">Nenhum voluntário cadastrado.</td></tr></tbody></table></div></main><footer th:replace="~{fragments/layout :: footer}"></footer></body></html>

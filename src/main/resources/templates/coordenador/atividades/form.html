<!DOCTYPE html><html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Cadastro de atividade</title><link rel="stylesheet" th:href="@{/css/style.css}"></head><body><header th:replace="~{fragments/layout :: header}"></header><main class="container page narrow"><div class="page-heading"><div><span class="eyebrow">ATIVIDADES</span><h1 th:text="${edicao} ? 'Editar atividade' : 'Nova atividade'"></h1><p>Registre a ação, a data e a carga horária planejada.</p></div></div><form class="form-card" th:action="${edicao} ? @{/coordenador/atividades/{id}(id=${id})} : @{/coordenador/atividades}" th:object="${form}" method="post"><div class="form-grid"><label class="span-2">Título<input th:field="*{titulo}" placeholder="Nome da atividade"><small class="field-error" th:errors="*{titulo}"></small></label><label class="span-2">Descrição<textarea th:field="*{descricao}" rows="4" placeholder="Objetivo e detalhes da ação"></textarea><small class="field-error" th:errors="*{descricao}"></small></label><label>Data<input type="date" th:field="*{data}"><small class="field-error" th:errors="*{data}"></small></label><label>Local<input th:field="*{local}" placeholder="Local da atividade"><small class="field-error" th:errors="*{local}"></small></label><label>Horas previstas<input type="number" min="0.5" step="0.5" th:field="*{horasPrevistas}"><small class="field-error" th:errors="*{horasPrevistas}"></small></label><label>Status<select th:field="*{status}"><option value="">Selecione</option><option th:each="s : ${statusDisponiveis}" th:value="${s}" th:text="${s.descricao}"></option></select><small class="field-error" th:errors="*{status}"></small></label></div><div class="form-actions"><a class="btn btn-outline" th:href="@{/coordenador/atividades}">Cancelar</a><button class="btn btn-primary">Salvar atividade</button></div></form></main><footer th:replace="~{fragments/layout :: footer}"></footer></body></html>

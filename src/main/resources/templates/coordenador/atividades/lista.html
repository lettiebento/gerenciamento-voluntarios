<!DOCTYPE html><html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Atividades</title><link rel="stylesheet" th:href="@{/css/style.css}"></head><body><header th:replace="~{fragments/layout :: header}"></header><div th:replace="~{fragments/layout :: flash}"></div><main class="container page"><div class="page-heading"><div><span class="eyebrow">PLANEJAMENTO</span><h1>Atividades</h1><p>Organize as ações realizadas pelo projeto.</p></div><a class="btn btn-primary" th:href="@{/coordenador/atividades/nova}">+ Nova atividade</a></div><div class="cards-list"><article class="activity-card" th:each="a : ${atividades}"><div class="date-box"><strong th:text="${#temporals.format(a.data,'dd')}"></strong><span th:text="${#strings.toUpperCase(#temporals.format(a.data,'MMM'))}"></span></div><div class="activity-content"><div><span class="badge" th:classappend="${a.status.name() == 'CONCLUIDA'} ? ' badge-success' : (${a.status.name() == 'CANCELADA'} ? ' badge-danger' : ' badge-info')" th:text="${a.status.descricao}"></span><h3 th:text="${a.titulo}"></h3><p th:text="${a.descricao}"></p></div><div class="activity-meta"><span>⌖ <b th:text="${a.local}"></b></span><span>◷ <b th:text="${#numbers.formatDecimal(a.horasPrevistas,1,1)} + ' horas'"></b></span></div></div><div class="activity-actions"><a class="btn btn-outline btn-sm" th:href="@{/coordenador/atividades/{id}/editar(id=${a.id})}">Editar</a><form th:action="@{/coordenador/atividades/{id}/excluir(id=${a.id})}" method="post" onsubmit="return confirm('Excluir esta atividade e suas participações?')"><button class="btn btn-danger btn-sm">Excluir</button></form></div></article><div th:if="${#lists.isEmpty(atividades)}" class="empty-card">Nenhuma atividade cadastrada.</div></div></main><footer th:replace="~{fragments/layout :: footer}"></footer></body></html>

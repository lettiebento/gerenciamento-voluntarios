<!DOCTYPE html><html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Participações</title><link rel="stylesheet" th:href="@{/css/style.css}"></head><body><header th:replace="~{fragments/layout :: header}"></header><div th:replace="~{fragments/layout :: flash}"></div><main class="container page"><div class="page-heading"><div><span class="eyebrow">ACOMPANHAMENTO</span><h1>Participações</h1><p>Controle presença e horas realizadas pelos voluntários.</p></div><a class="btn btn-primary" th:href="@{/coordenador/participacoes/nova}">+ Registrar participação</a></div><div class="table-card"><table><thead><tr><th>Voluntário</th><th>Atividade</th><th>Data</th><th>Presença</th><th>Horas</th><th>Ações</th></tr></thead><tbody><tr th:each="p : ${participacoes}"><td><strong th:text="${p.voluntario.nome}"></strong><small th:text="${p.voluntario.matricula}"></small></td><td><strong th:text="${p.atividade.titulo}"></strong><small th:text="${p.observacao ?: 'Sem observação'}"></small></td><td th:text="${#temporals.format(p.atividade.data,'dd/MM/yyyy')}"></td><td><span class="badge" th:classappend="${p.presente} ? ' badge-success' : ' badge-danger'" th:text="${p.presente} ? 'Presente' : 'Ausente'"></span></td><td><b th:text="${#numbers.formatDecimal(p.horasRealizadas,1,1)} + 'h'"></b></td><td class="actions"><a class="btn btn-outline btn-sm" th:href="@{/coordenador/participacoes/{id}/editar(id=${p.id})}">Editar</a><form th:action="@{/coordenador/participacoes/{id}/excluir(id=${p.id})}" method="post" onsubmit="return confirm('Excluir este registro?')"><button class="btn btn-danger btn-sm">Excluir</button></form></td></tr><tr th:if="${#lists.isEmpty(participacoes)}"><td colspan="6" class="empty">Nenhuma participação registrada.</td></tr></tbody></table></div></main><footer th:replace="~{fragments/layout :: footer}"></footer></body></html>

<!DOCTYPE html><html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Registro de participação</title><link rel="stylesheet" th:href="@{/css/style.css}"></head><body><header th:replace="~{fragments/layout :: header}"></header><main class="container page narrow"><div class="page-heading"><div><span class="eyebrow">PARTICIPAÇÕES</span><h1 th:text="${edicao} ? 'Editar participação' : 'Registrar participação'"></h1><p>Relacione um voluntário a uma atividade e informe as horas.</p></div></div><div th:if="${erro}" class="alert alert-error" th:text="${erro}"></div><form class="form-card" th:action="${edicao} ? @{/coordenador/participacoes/{id}(id=${id})} : @{/coordenador/participacoes}" th:object="${form}" method="post"><div class="form-grid"><label>Voluntário<select th:field="*{voluntarioId}"><option value="">Selecione</option><option th:each="v : ${voluntarios}" th:value="${v.id}" th:text="${v.nome + ' • ' + v.matricula}"></option></select><small class="field-error" th:errors="*{voluntarioId}"></small></label><label>Atividade<select th:field="*{atividadeId}"><option value="">Selecione</option><option th:each="a : ${atividades}" th:value="${a.id}" th:text="${a.titulo + ' • ' + #temporals.format(a.data,'dd/MM/yyyy') + ' • ' + a.horasPrevistas + 'h'}"></option></select><small class="field-error" th:errors="*{atividadeId}"></small></label><label>Horas realizadas<input type="number" min="0" step="0.5" th:field="*{horasRealizadas}"><small class="field-error" th:errors="*{horasRealizadas}"></small></label><label class="check-row align-end"><input type="checkbox" th:field="*{presente}"><span>Presença confirmada</span></label><label class="span-2">Observação<textarea rows="3" th:field="*{observacao}" placeholder="Informações adicionais"></textarea><small class="field-error" th:errors="*{observacao}"></small></label></div><div class="form-actions"><a class="btn btn-outline" th:href="@{/coordenador/participacoes}">Cancelar</a><button class="btn btn-primary">Salvar participação</button></div></form></main><footer th:replace="~{fragments/layout :: footer}"></footer></body></html>

<!DOCTYPE html><html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Relatório de horas</title><link rel="stylesheet" th:href="@{/css/style.css}"></head><body><header th:replace="~{fragments/layout :: header}"></header><main class="container page"><div class="page-heading"><div><span class="eyebrow">RELATÓRIOS</span><h1>Carga horária e certificação</h1><p>O certificado é liberado a partir de <b th:text="${horasMinimas} + ' horas'"></b>.</p></div><button class="btn btn-outline" onclick="window.print()">Imprimir relatório</button></div><section class="metrics-grid compact"><div class="metric-card"><span>Horas confirmadas</span><strong th:text="${#numbers.formatDecimal(totalHoras,1,1)} + 'h'"></strong></div><div class="metric-card"><span>Presenças registradas</span><strong th:text="${totalPresencas}"></strong></div><div class="metric-card accent"><span>Voluntários acompanhados</span><strong th:text="${#lists.size(resumos)}"></strong></div></section><div class="table-card"><table><thead><tr><th>Voluntário</th><th>Matrícula</th><th>Curso</th><th>Progresso</th><th>Total</th><th>Certificação</th></tr></thead><tbody><tr th:each="r : ${resumos}"><td><strong th:text="${r.nome}"></strong></td><td th:text="${r.matricula}"></td><td th:text="${r.curso}"></td><td class="progress-cell"><div class="progress-track"><span th:style="${'width:' + r.percentual + '%'}"></span></div><small th:text="${r.percentual} + '%'"></small></td><td><b th:text="${#numbers.formatDecimal(r.horas,1,1)} + 'h'"></b></td><td><span class="badge" th:classappend="${r.aptoCertificado} ? ' badge-success' : ' badge-info'" th:text="${r.aptoCertificado} ? 'Apto' : 'Em andamento'"></span></td></tr></tbody></table></div></main><footer th:replace="~{fragments/layout :: footer}"></footer></body></html>
